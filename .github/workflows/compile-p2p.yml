name: Compile p2p_test (kona-net)

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2025-02-01

      - name: Build
        working-directory: p2p_test
        run: cargo build --release 2>&1

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: p2p_test-binary
          path: p2p_test/target/release/p2p_test
